services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
    volumes:
      - ./bot-api-data:/var/lib/telegram-bot-api
    ports:
      - "8081:8081"
    restart: unless-stopped

  bot:
    build: .
    env_file: .env
    environment:
      LOCAL_BOT_API_URL: http://telegram-bot-api:8081
      LOCAL_BOT_API_DATA: /data/bot-api-data
    volumes:
      - ./temp:/app/temp
      - ./data:/app/data
      - ./bot-api-data:/data/bot-api-data:ro
    depends_on:
      - telegram-bot-api
    restart: unless-stopped
