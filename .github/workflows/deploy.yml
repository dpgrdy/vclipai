name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            cd /opt/vclipai

            # Pull latest code
            git pull origin master

            # Rebuild and restart
            docker compose up -d --build

            # Show status
            docker compose ps
            echo "Deploy complete at $(date)"
