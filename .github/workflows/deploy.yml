name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            cd /opt/vclipai || {
              echo "First deploy — cloning..."
              git clone https://github.com/dpgrdy/vclipai.git /opt/vclipai
              cd /opt/vclipai
            }

            # Pull latest code
            git pull origin master

            # Ensure directories
            mkdir -p temp data bot-api-data

            # Build and restart
            docker compose up -d --build

            # Show status
            docker compose ps
            echo "Deploy complete at $(date)"
